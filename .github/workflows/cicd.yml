name: DevSecOps IDS CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Show current directory
        run: |
          pwd
          ls -la

      - name: Deploy IDS
        run: |
          docker compose down || true
          docker compose up --build -d

      - name: Verify containers
        run: docker ps
